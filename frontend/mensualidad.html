
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de turnos - Taekwondo</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
    <div class ="contenido-pagina"><h2>Mensualidades</h2>

        <form id="formMensualidad">
            <select id="estudiante"></select>
            <input type="number" id="precio" placeholder="Precio">
            <input type="date" id="fecha">

            <button type="submit">Guardar</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Estudiante</th>
                    <th>Precio</th>
                    <th>Fecha Límite</th>
                </tr>
            </thead>
            <tbody id="tablaMensualidad"></tbody>
        </table>

        <script src="js/mensualidad.js"></script>
        <script src="js/main.js"></script>
    </div>
</body>
</html>
